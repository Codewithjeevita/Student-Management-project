<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
</head>
<body>
    <h2>Add Student</h2>
    <form method="POST">
        <input type="text" name="name" placeholder="Student Name" required><br><br>
        <input type="text" name="roll" placeholder="Roll Number" required><br><br>
        <input type="text" name="department" placeholder="Department" required><br><br>
        <input type="number" name="marks" placeholder="Marks" required><br><br>
        <input type="number" name="attendance" placeholder="Attendance %" required><br><br>
        <input type="text" name="fees" placeholder="Fees Status (Paid/Unpaid)" required><br><br>
        <button type="submit">Add</button>
    </form>
    <br>
    <a href="/dashboard">Back to Dashboard</a>
</body>
</html>
